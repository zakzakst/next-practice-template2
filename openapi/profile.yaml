openapi: 3.0.0
info:
  title: プロフィール
  version: 1.0.0

paths:
  /profile:
    get:
      operationId: getProfile
      summary: プロフィール取得
      responses:
        "200":
          description: プロフィール取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: "#/components/schemas/Profile"
                    nullable: true

components:
  schemas:
    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date
        updatedAt:
          type: string
          format: date
      required: ["id", "name", "email", "createdAt", "updatedAt"]
